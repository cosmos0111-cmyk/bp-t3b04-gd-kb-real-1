<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b91c1c"/>
      <stop offset="100%" stop-color="#991b1b"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fca5a5"/>
      <stop offset="100%" stop-color="#991b1b"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Geometric pattern -->
  <circle cx="928" cy="104" r="61" fill="#991b1b" opacity="0.13"/>
    <circle cx="273" cy="128" r="38" fill="#991b1b" opacity="0.13"/>
    <circle cx="871" cy="676" r="74" fill="#991b1b" opacity="0.10"/>
    <circle cx="635" cy="448" r="53" fill="#991b1b" opacity="0.15"/>
    <circle cx="987" cy="391" r="42" fill="#991b1b" opacity="0.15"/>
    <circle cx="394" cy="-94" r="80" fill="#991b1b" opacity="0.07"/>
    <rect x="1092" y="245" width="93" height="63" rx="8" fill="#b91c1c" opacity="0.05" transform="rotate(28, 498, 447)"/>
    <rect x="601" y="-88" width="24" height="51" rx="8" fill="#b91c1c" opacity="0.14" transform="rotate(3, 826, 283)"/>
    <rect x="183" y="134" width="49" height="88" rx="8" fill="#b91c1c" opacity="0.12" transform="rotate(42, 1147, 143)"/>
    <rect x="56" y="144" width="97" height="31" rx="8" fill="#b91c1c" opacity="0.05" transform="rotate(13, 1097, -65)"/>
    <rect x="1203" y="355" width="25" height="81" rx="8" fill="#b91c1c" opacity="0.08" transform="rotate(21, 846, 171)"/>
    <rect x="212" y="353" width="72" height="90" rx="8" fill="#b91c1c" opacity="0.10" transform="rotate(27, 855, 63)"/>
    <rect x="346" y="213" width="61" height="92" rx="8" fill="#b91c1c" opacity="0.10" transform="rotate(6, 96, 514)"/>
    <rect x="285" y="607" width="92" height="41" rx="8" fill="#b91c1c" opacity="0.09" transform="rotate(7, 1093, 34)"/>
    <polygon points="306,-106 400,82 212,82" fill="#991b1b" opacity="0.07"/>
    <polygon points="526,584 582,696 470,696" fill="#991b1b" opacity="0.05"/>
    <polygon points="501,155 582,317 420,317" fill="#991b1b" opacity="0.12"/>
    <polygon points="70,444 144,592 -4,592" fill="#991b1b" opacity="0.13"/>

  <!-- Wave at bottom -->
  <path d="M0,564 C360,597 840,531 1200,564 L1200,630 L0,630Z" fill="#991b1b" opacity="0.3"/>

  <!-- 중앙 텍스트 카드 -->
  <rect x="80" y="195" width="1040" height="260" rx="20" fill="rgba(0,0,0,0.35)" filter="url(#blur-bg)"/>
  <filter id="blur-bg"><feGaussianBlur stdDeviation="8"/></filter>

  <text x="600" y="270" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="2">
    공덕 노래방 내돈내산
  </text>
  <text x="600" y="330" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.85)">
    공덕 — 노래방
  </text>

  <!-- Accent line -->
  <line x1="450" y1="355" x2="750" y2="355" stroke="#fca5a5" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <!-- 하단 CTA -->
  <rect x="440" y="385" width="320" height="40" rx="20" fill="#fca5a5" opacity="0.9"/>
  <text x="600" y="411" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="16" font-weight="600" fill="#ffffff">
    ▼ 자세히 보기
  </text>

  <!-- 상단 브랜드 -->
  <text x="60" y="55" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.6)">
    공덕 공덕 노래방 내돈내산 — 노래방
  </text>
</svg>